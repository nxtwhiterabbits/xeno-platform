<!DOCTYPE html>
<html>
<head>
  <title>XENO LOGIN</title>
</head>
<body>

<h2>LOGIN XENO</h2>

<input id="username" placeholder="username"><br>
<input id="password" type="password" placeholder="password"><br>

<button onclick="login()" id="btn">LOGIN</button>

<p id="msg"></p>

<script>
let API_URL = "";
let ready = false;

/* =========================
   LOAD CONFIG (SAFE)
========================= */
async function loadConfig() {
    try {
        const res = await fetch("https://nxtwhiterabbits.github.io/xeno-platform/config/config.json");
        const config = await res.json();

        API_URL = config.API_URL;
        ready = true;

        console.log("API READY:", API_URL);

    } catch (err) {
        console.log("CONFIG FAIL", err);
        document.getElementById("msg").innerText = "Config error";
    }
}

/* =========================
   LOGIN
========================= */
async function login() {

    console.log("CLICKED");

    if (!ready) {
        document.getElementById("msg").innerText = "System loading...";
        return;
    }

    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    const res = await fetch(API_URL + "/api/login.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `username=${u}&password=${p}`
    });

    const data = await res.json();

    console.log(data);

    if (data.status === "success") {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", data.username);

        console.log("REDIRECTING");

        window.location.href = "/app/wallet.html";
    } else {
        document.getElementById("msg").innerText = data.message;
    }
}

/* START */
loadConfig();
</script>

</body>
</html>
