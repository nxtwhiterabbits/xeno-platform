<!DOCTYPE html>
<html>
<head>
  <title>XENO LOGIN</title>
</head>
<body style="font-family: Arial;">

<h2>LOGIN XENO</h2>

<div>
  <input id="username" placeholder="username" style="display:block;margin:5px;">
  <input id="password" type="password" placeholder="password" style="display:block;margin:5px;">
  <button onclick="login()" style="margin:5px;">Login</button>
</div>

<p id="msg"></p>

<script>
let API_URL = "";

/* =========================
   LOAD CONFIG
========================= */
async function loadConfig() {
    const res = await fetch("../config/config.json");
    const config = await res.json();
    API_URL = config.API_URL;
}

/* =========================
   LOGIN FUNCTION
========================= */
async function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    if (!u || !p) {
        document.getElementById("msg").innerText = "Fill all fields";
        return;
    }

    const res = await fetch(API_URL + "/api/login.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `username=${u}&password=${p}`
    });

    const data = await res.json();

    if (data.status === "success") {
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", data.username);

        window.location.href = "wallet.html";
    } else {
        document.getElementById("msg").innerText = data.message;
    }
}

loadConfig();
</script>

</body>
</html>
