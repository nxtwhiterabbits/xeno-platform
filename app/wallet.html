<!DOCTYPE html>
<html>
<head>
  <title>XENO Wallet</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    .box {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      cursor: pointer;
    }

    .dep { background: #00ff88; }
    .wd { background: #ff4d4d; color: white; }
  </style>
</head>

<body>

<div class="box">

  <h2>💎 XENO WALLET</h2>

  <p>User: <span id="user">-</span></p>
  <h1>$ <span id="balance">0</span></h1>

  <input id="amount" type="number" placeholder="Amount">

  <button class="dep" onclick="deposit()">Deposit</button>
  <button class="wd" onclick="withdraw()">Withdraw</button>

  <button onclick="logout()">Logout</button>

</div>

<script>
let API_URL = "";
let token = localStorage.getItem("token");
let user = localStorage.getItem("user");

/* =========================
   LOAD CONFIG (WAJIB BETUL)
========================= */
async function loadConfig() {
    try {
        const res = await fetch("./config/config.json");
        const config = await res.json();

        API_URL = config.API_URL;

        console.log("API LOADED:", API_URL);

        if (!token) {
            window.location.href = "login.html";
            return;
        }

        document.getElementById("user").innerText = user;

        loadBalance();

    } catch (err) {
        console.log("CONFIG ERROR", err);
    }
}

/* =========================
   LOAD BALANCE
========================= */
async function loadBalance() {
    const res = await fetch(API_URL + "/api/balance.php?token=" + token);
    const data = await res.json();

    if (data.status === "success") {
        document.getElementById("balance").innerText = data.balance;
    }
}

/* =========================
   DEPOSIT
========================= */
async function deposit() {
    const amount = document.getElementById("amount").value;

    await fetch(API_URL + "/api/deposit.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `token=${token}&amount=${amount}`
    });

    loadBalance();
}

/* =========================
   WITHDRAW
========================= */
async function withdraw() {
    const amount = document.getElementById("amount").value;

    await fetch(API_URL + "/api/withdraw.php", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `token=${token}&amount=${amount}`
    });

    loadBalance();
}

/* =========================
   LOGOUT
========================= */
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

/* START */
loadConfig();
</script>

</body>
</html>
