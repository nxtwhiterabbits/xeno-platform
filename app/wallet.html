<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>XENO WALLET</title>
</head>
<body>

<h2>XENO WALLET</h2>

<p>User: <span id="user">-</span></p>
<p>Balance: <span id="balance">0</span></p>

<input id="amount" type="number" placeholder="amount">

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
<button onclick="logout()">Logout</button>

<p id="msg"></p>

<script>

let API_URL = "";

/* =========================
   AUTH CHECK
========================= */
const token = localStorage.getItem("token");
const user = localStorage.getItem("user");

if (!token) {
    window.location.href = "./login.html";
}

/* =========================
   INIT
========================= */
window.addEventListener("load", () => {

    document.getElementById("user").innerText = user || "-";

    loadConfig();
});


/* =========================
   CONFIG LOAD
========================= */
async function loadConfig() {

    try {

        console.log("[CONFIG] loading...");

        const res = await fetch("./config/config.json", {
            cache: "no-store"
        });

        if (!res.ok) {
            throw new Error("config not found: " + res.status);
        }

        const config = await res.json();

        API_URL = config.API_URL;

        console.log("[CONFIG OK]", API_URL);

        // langsung load balance (NO READY FLAG)
        loadBalance();

    } catch (err) {

        console.error("[CONFIG ERROR]", err);

        document.getElementById("msg").innerText =
            "Config error: " + err.message;
    }
}


/* =========================
   BALANCE
========================= */
async function loadBalance() {

    try {

        const res = await fetch(
            `${API_URL}/api/balance.php?token=${token}`
        );

        const data = await res.json();

        console.log("[BALANCE]", data);

        if (data.status === "success") {
            document.getElementById("balance").innerText = data.balance;
        } else {
            document.getElementById("msg").innerText = data.message;
        }

    } catch (err) {

        console.error(err);
        document.getElementById("msg").innerText = "Balance error";
    }
}


/* =========================
   DEPOSIT
========================= */
async function deposit() {

    const amount = document.getElementById("amount").value;

    try {

        const res = await fetch(`${API_URL}/api/deposit.php`, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `token=${token}&amount=${amount}`
        });

        const data = await res.json();

        if (data.status === "success") {
            loadBalance();
        } else {
            document.getElementById("msg").innerText = data.message;
        }

    } catch (err) {
        document.getElementById("msg").innerText = "Deposit error";
    }
}


/* =========================
   WITHDRAW
========================= */
async function withdraw() {

    const amount = document.getElementById("amount").value;

    try {

        const res = await fetch(`${API_URL}/api/withdraw.php`, {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `token=${token}&amount=${amount}`
        });

        const data = await res.json();

        if (data.status === "success") {
            loadBalance();
        } else {
            document.getElementById("msg").innerText = data.message;
        }

    } catch (err) {
        document.getElementById("msg").innerText = "Withdraw error";
    }
}


/* =========================
   LOGOUT
========================= */
function logout() {
    localStorage.clear();
    window.location.href = "./login.html";
}

</script>

</body>
</html>
