<!DOCTYPE html>
<html>
<head>
  <title>XENO WALLET</title>
</head>
<body>

<h2>XENO WALLET</h2>

<p>User: <span id="user">-</span></p>
<p>Balance: <span id="balance">0</span></p>

<input id="amount" type="number" placeholder="amount">

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
<button onclick="logout()">Logout</button>

<p id="msg"></p>

<script>

let API_URL = "";
let READY = false;

const token = localStorage.getItem("token");
const user = localStorage.getItem("user");

/* =========================
   GUARD
========================= */
if (!token) {
    window.location.href = "./login.html";
}

/* =========================
   INIT
========================= */
window.addEventListener("load", async () => {

    document.getElementById("user").innerText = user;

    await loadConfig();

});


/* =========================
   CONFIG (FIXED PATH + DEBUG)
========================= */
async function loadConfig() {

    try {

        console.log("[CONFIG] loading...");

        const res = await fetch("/config/config.json", {
            cache: "no-store"
        });

        if (!res.ok) {
            throw new Error("config not found: " + res.status);
        }

        const config = await res.json();

        API_URL = config.API_URL;

        if (!API_URL) {
            throw new Error("API_URL missing");
        }

        READY = true;

        console.log("[CONFIG OK]", API_URL);

        await loadBalance();

    } catch (err) {

        console.error("[CONFIG ERROR]", err);

        document.getElementById("msg").innerText =
            "Config error: " + err.message;
    }
}


/* =========================
   BALANCE
========================= */
async function loadBalance() {

    if (!READY) return;

    try {

        const res = await fetch(
            `${API_URL}/api/balance.php?token=${token}`
        );

        const data = await res.json();

        console.log("[BALANCE]", data);

        if (data.status === "success") {
            document.getElementById("balance").innerText = data.balance;
        } else {
            document.getElementById("msg").innerText = data.message;
        }

    } catch (err) {

        console.error(err);

        document.getElementById("msg").innerText =
            "Balance error";
    }
}


/* =========================
   DEPOSIT
========================= */
async function deposit() {

    if (!READY) return;

    const amount = document.getElementById("amount").value;

    const res = await fetch(`${API_URL}/api/deposit.php`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `token=${token}&amount=${amount}`
    });

    const data = await res.json();

    if (data.status === "success") {
        loadBalance();
    } else {
        document.getElementById("msg").innerText = data.message;
    }
}


/* =========================
   WITHDRAW
========================= */
async function withdraw() {

    if (!READY) return;

    const amount = document.getElementById("amount").value;

    const res = await fetch(`${API_URL}/api/withdraw.php`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `token=${token}&amount=${amount}`
    });

    const data = await res.json();

    if (data.status === "success") {
        loadBalance();
    } else {
        document.getElementById("msg").innerText = data.message;
    }
}


/* =========================
   LOGOUT
========================= */
function logout() {
    localStorage.clear();
    window.location.href = "./login.html";
}

</script>

</body>
</html>
