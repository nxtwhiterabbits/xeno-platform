<!DOCTYPE html>
<html>
<head>
  <title>XENO WALLET</title>
</head>
<body>

<h2>XENO WALLET</h2>

<p>User: <span id="user">-</span></p>
<p>Balance: <span id="balance">0</span></p>

<input id="amount" type="number" placeholder="amount">

<button onclick="deposit()">Deposit</button>
<button onclick="withdraw()">Withdraw</button>
<button onclick="logout()">Logout</button>

<p id="msg"></p>

<script>
let API_URL = "";
const token = localStorage.getItem("token");
const user = localStorage.getItem("user");

/* =========================
   GUARD
========================= */
if (!token) {
    window.location.href = "./login.html";
}

/* =========================
   LOAD CONFIG
========================= */
async function loadConfig() {
    try {
        const res = await fetch("./config/config.json");
        const config = await res.json();

        API_URL = config.API_URL;

        document.getElementById("user").innerText = user;

        loadBalance();

    } catch (err) {
        document.getElementById("msg").innerText = "Config error";
    }
}

/* =========================
   LOAD BALANCE
========================= */
async function loadBalance() {
    try {
        const res = await fetch(`${API_URL}/api/balance.php?token=${token}`);
        const data = await res.json();

        if (data.status === "success") {
            document.getElementById("balance").innerText = data.balance;
        } else {
            document.getElementById("msg").innerText = data.message;
        }

    } catch (err) {
        document.getElementById("msg").innerText = "Balance error";
    }
}

/* =========================
   DEPOSIT
========================= */
async function deposit() {
    const amount = document.getElementById("amount").value;

    const res = await fetch(`${API_URL}/api/deposit.php`, {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `token=${token}&amount=${amount}`
    });

    const data = await res.json();

    if (data.status === "success") {
        loadBalance();
    } else {
        document.getElementById("msg").innerText = data.message;
    }
}

/* =========================
   WITHDRAW
========================= */
async function withdraw() {
    const amount = document.getElementById("amount").value;

    const res = await fetch(`${API_URL}/api/withdraw.php`, {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `token=${token}&amount=${amount}`
    });

    const data = await res.json();

    if (data.status === "success") {
        loadBalance();
    } else {
        document.getElementById("msg").innerText = data.message;
    }
}

/* =========================
   LOGOUT
========================= */
function logout() {
    localStorage.clear();
    window.location.href = "./login.html";
}

loadConfig();
</script>

</body>
</html>
